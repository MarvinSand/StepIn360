<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Natraj Guest House – Virtual Tour | StepIn360</title>

  <meta name="description" content="Explore Natraj Guest House in Trincomalee with a professional 360° virtual tour." />

  <script src="../theme.js?v=3"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fff;
    }

    /* HEADER */
    header {
      background: #000;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #111;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
    }

    .nav-right {
      display: flex;
      gap: 30px;
    }

    /* CONTENT */
    .container {
      max-width: 1100px;
      margin: 70px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 38px;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 18px;
      color: #bbb;
      margin-bottom: 45px;
    }

    .tour {
      display: flex;
      justify-content: center;
      margin-bottom: 55px;
    }

    /* LINKS */
    .links {
      display: flex;
      justify-content: center;
      gap: 45px;
      flex-wrap: wrap;
    }

    .links a {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .links a:hover {
      transform: scale(1.06);
      opacity: 0.85;
    }

    .links img {
      height: 42px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 28px;
      }
    }

    /* Theme toggle (in header) */
    .theme-toggle {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: inherit;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease;
      padding: 0;
    }
    .theme-toggle:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.3); }
    .theme-toggle:focus-visible { outline: 2px solid #4facfe; outline-offset: 2px; }

    .nav-right { align-items: center; }

    /* Light mode overrides */
    :root[data-theme="light"] body { background: #f8f8f8; color: #1a1a1a; }
    :root[data-theme="light"] header { background: #ffffff; border-bottom: 1px solid #e5e7eb; }
    :root[data-theme="light"] header a { color: #1a1a1a; }
    :root[data-theme="light"] .subtitle { color: #475569; }
    :root[data-theme="light"] .links a { color: #1a1a1a; }
    :root[data-theme="light"] footer { color: #6b7280; }
    :root[data-theme="light"] .theme-toggle {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.12);
    }
    :root[data-theme="light"] .theme-toggle:hover { border-color: rgba(0,0,0,0.25); }
  </style>
</head>

<body>

<header>
  <a href="/">StepIn360</a>

  <div class="nav-right">
    <a href="/examples.html">Examples</a>
    <a href="/contact.html">Contact</a>
    <button class="theme-toggle" aria-label="Toggle theme"></button>
  </div>
</header>

<div class="container">
  <h1>Natraj Guest House</h1>
  <p class="subtitle">
    Explore the guest house with a 360° virtual tour and see the rooms before booking.
  </p>

  <!-- Main Tour -->
  <div class="tour">
    <script
      src="https://teliportme.com/js/embed.js"
      data-teliportme="https://teliportme.com/embed/tour/9895f769"
      data-width="800"
      data-height="420">
    </script>
  </div>

  <!-- Rooms 10 & 11 -->
  <section style="margin-top:60px;">
    <h2 style="text-align:center; font-size:28px; margin-bottom:16px;">
      Upper Floor – Rooms 10 &amp; 11
    </h2>

    <div class="tour">
      <script
        src="https://teliportme.com/js/embed.js"
        data-teliportme="https://teliportme.com/embed/tour/e847bd19/2532438"
        data-width="800"
        data-height="420">
      </script>
    </div>
  </section>
</div>
  
  <div class="links">
    <a href="https://www.booking.com/Share-udtn2Y" target="_blank">
      <img src="/Images/Booking.png" alt="Booking.com">
      Booking.com
    </a>

    <a href="https://www.trip.com/w/QEJZxpDwIT2" target="_blank">
      <img src="/Images/Trip.png" alt="Trip.com">
      Trip.com
    </a>

    <a href="https://share.google/NaLdjw4ZmSTAXHWDb" target="_blank">
      <img src="/Images/googlemaps.png" alt="Google Maps">
      Google Maps
    </a>
  </div>
</div>

<footer>
  © 2026 StepIn360 · Virtual Tours that increase bookings
</footer>

</body>
</html>
