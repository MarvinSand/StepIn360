<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Ocean Vibes Hotel | StepIn360</title>

  <script src="../theme.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      margin-left: 24px;
    }

    header a:hover {
      opacity: 0.8;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      margin: 60px 0 20px 0;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    .tour {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px 0 60px 0;
      flex-wrap: wrap;
    }

    .links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }

    .links img {
      width: 60px;
      height: auto;
      margin-bottom: 10px;
    }

    .links a:hover {
      opacity: 0.85;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 14px;
      opacity: 0.6;
    }

    /* Theme toggle (in header) */
    .theme-toggle {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: inherit;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      margin-left: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
      padding: 0;
      vertical-align: middle;
    }
    .theme-toggle:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.3); }
    .theme-toggle:focus-visible { outline: 2px solid #4facfe; outline-offset: 2px; }

    header > div { display: flex; align-items: center; }

    /* Light mode overrides */
    :root[data-theme="light"] body { background: #f8f8f8; color: #1a1a1a; }
    :root[data-theme="light"] header a { color: #1a1a1a; }
    :root[data-theme="light"] .links a { color: #1a1a1a; }
    :root[data-theme="light"] footer { color: #6b7280; opacity: 1; }
    :root[data-theme="light"] .theme-toggle {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.12);
    }
    :root[data-theme="light"] .theme-toggle:hover { border-color: rgba(0,0,0,0.25); }
  </style>
</head>

<body>

  <header>
    <a href="https://www.stepin360.net"><strong>StepIn360</strong></a>
    <div>
      <a href="https://www.stepin360.net/examples">Examples</a>
      <a href="https://www.stepin360.net/contact">Contact</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div class="container">
    <h1>New Ocean Vibes Hotel</h1>
    <p class="subtitle">
      Explore the hotel with an immersive 360° virtual tour.
    </p>

    <!-- HOTEL TOUR -->
    <div class="tour">
      <script
        src="https://teliportme.com/js/embed.js"
        data-teliportme="https://teliportme.com/embed/tour/4c333ccf"
        data-width="800"
        data-height="420">
      </script>
    </div>

    <!-- HOTEL LINKS -->
    <div class="links">
      <a href="https://www.booking.com/Share-r0Z2N71" target="_blank">
        <img src="/Images/Booking.png" alt="Booking.com">
        Booking.com
      </a>

      <a href="https://share.google/9maFywVNbOpGQFkXT" target="_blank">
        <img src="/Images/googlemaps.png" alt="Google Maps">
        Google Maps
      </a>
    </div>

    <!-- RESTAURANT SECTION -->
    <h2>Lazy Right Restaurant and Bar</h2>

    <div class="tour">
      <script
        src="https://teliportme.com/js/embed.js"
        data-teliportme="https://teliportme.com/embed/tour/fcec2518"
        data-width="800"
        data-height="420">
      </script>
    </div>

    <!-- RESTAURANT GOOGLE MAPS -->
    <div class="links">
      <a href="https://maps.app.goo.gl/vffcztNcWWfPDRNu9?g_st=ic" target="_blank">
        <img src="/Images/googlemaps.png" alt="Google Maps">
        View on Google Maps
      </a>
    </div>

  </div>

  <footer>
    © 2026 StepIn360 · 360° Virtual Tours
  </footer>

</body>
</html>
