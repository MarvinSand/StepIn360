<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – StepIn360</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="theme.js"></script>
  <style>
    .contact-container {
      max-width: 600px;
      margin: 0 auto 100px;
      padding: 0 20px;
    }

    .contact-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .contact-header h1 {
      font-size: clamp(36px, 4vw, 48px);
      margin-bottom: 16px;
    }

    .contact-header p {
      color: var(--text-muted);
      font-size: 18px;
    }

    .contact-methods {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .method-card {
      background: var(--surface-secondary);
      border: 1px solid var(--border-color);
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      flex: 1;
      min-width: 250px;
      transition: var(--transition);
      cursor: pointer;
    }

    .method-card:hover {
      border-color: #4facfe;
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .method-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: rgba(79, 172, 254, 0.1);
      color: #4facfe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .method-card h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    .method-card p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .contact-form {
      background: var(--surface-main);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 16px;
      background: var(--surface-secondary);
      border: 1px solid #2d3748;
      border-radius: 12px;
      color: var(--text-main);
      font-size: 16px;
      font-family: inherit;
      transition: var(--transition);
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      outline: none;
      border-color: #4facfe;
      background: #1e293b;
      box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
    }

    .contact-form button {
      width: 100%;
      padding: 18px;
      font-size: 16px;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<header>
  <a href="/" class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <defs>
        <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00f2fe" />
          <stop offset="100%" stop-color="#4facfe" />
        </linearGradient>
      </defs>
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
      <path d="M2 12h20"></path>
    </svg>
    Step<span>In</span>360
  </a>
  <nav>
    <a href="/examples.html">Examples</a>
    <a href="/contact.html" class="active">Contact</a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  </nav>
</header>

<div class="page-wrapper animate-fade-in">
  
  <div class="contact-container">
    <div class="contact-header">
      <h1>Let's work <span class="text-gradient">together</span></h1>
      <p>Have a project in mind? Reach out to schedule a shoot or ask any questions.</p>
    </div>

    <div class="contact-methods delay-1 animate-fade-in">
      <a href="https://wa.me/4917673533365" target="_blank" class="method-card">
        <div class="method-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </div>
        <h3>WhatsApp</h3>
        <p>Chat directly with us for a quick response.</p>
      </a>
      
      <a href="mailto:contact@stepin360.net" class="method-card">
        <div class="method-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <h3>Email</h3>
        <p>contact@stepin360.net</p>
      </a>
    </div>

    <div class="contact-form delay-2 animate-fade-in">
      <form action="https://formsubmit.co/contact@stepin360.net" method="POST">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label>Business Name (Optional)</label>
          <input type="text" name="business" placeholder="The Grand Hotel">
        </div>
        <div class="form-group">
          <label>Tell me about your place</label>
          <textarea name="message" rows="5" placeholder="I have a 30-room boutique hotel and would love a 360 tour..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">
          Send Request
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
  </div>

</div>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <h2>StepIn360</h2>
    <div class="footer-copy">
      © 2026 StepIn360 – Elevated Virtual Tours for Businesses.
    </div>
  </div>
</footer>

</body>
</html>
