<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ivory Resort Dickwella | StepIn360</title>

  <script src="../theme.js?v=3"></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }
    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      margin-left: 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 36px;
    }

    .tour {
      display: flex;
      justify-content: center;
      margin-bottom: 60px;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 36px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .links a {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
    }
    .links img {
      width: 60px;
      height: auto;
      margin-bottom: 8px;
    }

    /* Theme toggle (in header) */
    .theme-toggle {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: inherit;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer;
      margin-left: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
      padding: 0;
      vertical-align: middle;
    }
    .theme-toggle:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.3); }
    .theme-toggle:focus-visible { outline: 2px solid #4facfe; outline-offset: 2px; }

    header > div { display: flex; align-items: center; }

    /* Light mode overrides */
    :root[data-theme="light"] body { background: #f8f8f8; color: #1a1a1a; }
    :root[data-theme="light"] header a { color: #1a1a1a; }
    :root[data-theme="light"] .subtitle { opacity: 0.8; color: #475569; }
    :root[data-theme="light"] .links a { color: #1a1a1a; }
    :root[data-theme="light"] .theme-toggle {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.12);
    }
    :root[data-theme="light"] .theme-toggle:hover { border-color: rgba(0,0,0,0.25); }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <a href="https://www.stepin360.net"><strong>StepIn360</strong></a>
    <div>
      <a href="https://www.stepin360.net/examples">Examples</a>
      <a href="https://www.stepin360.net/contact">Contact</a>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <!-- Content -->
  <div class="container">

    <h1>Ivory Resort Dickwella</h1>
    <p class="subtitle">Explore the resort with an immersive 360° virtual tour.</p>

    <div class="tour">
      <script
        src="https://teliportme.com/js/embed.js"
        data-teliportme="https://teliportme.com/embed/tour/14c447af"
        data-width="800"
        data-height="420">
      </script>
    </div>

    <!-- Booking / Google Links -->
    <div class="links">
      <a href="https://www.booking.com/Share-bZ7wEo" target="_blank">
        <img src="/Images/Booking.png" alt="Booking.com">
        Booking.com
      </a>

      <a href="https://share.google/zQFyJ6P0xnjYfQ51F" target="_blank">
        <img src="/Images/googlemaps.png" alt="Google Maps">
        Google Maps
      </a>
    </div>

  </div>

</body>
</html>
